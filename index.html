<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<title>Inicio Sesión Retro XP con CRT</title>
<style>
  /* Fondo y diseño general */
  body {
    margin:0; padding:0;
    background: linear-gradient(to bottom, #316AC5 0%, #7FA9EB 100%);
    font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    color: white;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    overflow: hidden;
  }

  /* Contenedor principal */
  .login-box {
    background: #234A93;
    width: 350px;
    height: 500px;
    border: 2px solid #103070;
    box-shadow: 0 0 15px #1B356B;
    border-radius: 6px;
    display: flex;
    flex-direction: column;
    padding: 20px;
    box-sizing: border-box;
    position: relative;
    z-index: 1;
  }

  /* Título */
  .title {
    text-align: center;
    font-weight: bold;
    font-size: 1.4rem;
    margin-bottom: 10px;
  }

  /* Lista de usuarios */
  .users-list {
    flex-grow: 1;
    overflow-y: auto;
    margin-bottom: 15px;
  }

  /* Cada usuario */
  .user-item {
    background: #316AC5;
    margin-bottom: 8px;
    padding: 6px 10px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    cursor: pointer;
    border: 1px solid transparent;
  }
  .user-item:hover {
    background: #72A0F9;
    border-color: #A2C6FF;
  }
  .user-item img {
    width: 48px;
    height: 48px;
    border-radius: 6px;
    border: 2px solid #103070;
    margin-right: 10px;
    object-fit: cover;
  }
  .user-name {
    font-size: 1.1rem;
    font-weight: 600;
    color: white;
  }
  .user-actions button {
    background: #72A0F9;
    border: 1px solid #A2C6FF;
    color: white;
    font-size: 0.9rem;
    padding: 2px 5px;
    border-radius: 4px;
    cursor: pointer;
  }
  .user-actions button:hover {
    background: #A2C6FF;
    color: #234A93;
  }

  /* Botones inferiores */
  .bottom-buttons {
    border-top: 1px solid #103070;
    padding-top: 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  button {
    background: #316AC5;
    border: 1px solid #103070;
    color: white;
    font-weight: bold;
    font-size: 1rem;
    padding: 8px 0;
    border-radius: 4px;
    cursor: pointer;
  }
  button:hover {
    background: #72A0F9;
    border-color: #A2C6FF;
  }

  /* Modal para registro */
  .modal-bg {
    position: fixed;
    top:0; left:0; right:0; bottom:0;
    background: rgba(0,0,0,0.7);
    display:none;
    justify-content: center;
    align-items: center;
    z-index: 10;
  }
  .modal {
    background: #234A93;
    border-radius: 6px;
    padding: 20px;
    width: 320px;
    color: white;
    box-shadow: 0 0 20px #1B356B;
  }
  .modal h2 {
    margin-top:0;
    margin-bottom: 15px;
  }
  .modal input {
    width: 100%;
    margin-bottom: 10px;
    padding: 8px;
    border-radius: 4px;
    border: 1px solid #103070;
    background: #316AC5;
    color: white;
    font-size: 1rem;
  }
  .modal input::placeholder {
    color: #c9d1ffcc;
  }
  .modal label {
    display: block;
    margin-bottom: 6px;
  }
  .modal .img-preview {
    width: 80px;
    height: 80px;
    border-radius: 8px;
    border: 2px solid #103070;
    margin-bottom: 10px;
    object-fit: cover;
  }
  .modal-buttons {
    display: flex;
    justify-content: space-between;
  }
  .modal button {
    width: 48%;
  }
  /* Scrollbar para lista usuarios */
  .users-list::-webkit-scrollbar {
    width: 6px;
  }
  .users-list::-webkit-scrollbar-thumb {
    background: #103070;
    border-radius: 3px;
  }

  /* -------------------- */
  /* FILTRO CRT */

  /* Overlay líneas horizontales (scanlines) */
  .crt-overlay {
    pointer-events:none;
    position: fixed;
    top:0; left:0; width:100%; height:100%;
    background: repeating-linear-gradient(
      to bottom,
      rgba(0,255,0,0.04) 0px,
      rgba(0,255,0,0.04) 2px,
      transparent 3px,
      transparent 4px
    );
    z-index: 1000;
    animation: flicker 0.15s infinite alternate;
  }

  /* Pequeño ruido/scan flicker */
  @keyframes flicker {
    0% {
      opacity: 0.06;
      background-position: 0 0;
      filter: drop-shadow(0 0 1px #0f0);
    }
    100% {
      opacity: 0.12;
      background-position: 0 2px;
      filter: drop-shadow(0 0 2px #0f0);
    }
  }

  /* Brillo fantasmal ligero */
  .crt-glow {
    pointer-events:none;
    position: fixed;
    top:0; left:0; width:100%; height:100%;
    background:
      radial-gradient(circle at center, rgba(0,255,0,0.2), transparent 60%);
    mix-blend-mode: screen;
    filter: blur(2px);
    z-index: 1001;
    animation: glowPulse 2s infinite ease-in-out alternate;
  }

  @keyframes glowPulse {
    0% {opacity: 0.1;}
    100% {opacity: 0.25;}
  }

  /* Curvatura tipo CRT (opcional, sutil) */
  body::before {
    content: "";
    pointer-events:none;
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    border-radius: 15px;
    box-shadow: inset 0 0 40px 20px rgba(0,255,0,0.1);
    mix-blend-mode: screen;
    z-index: 999;
  }

</style>
</head>
<body>

<div class="login-box">
  <div class="title">Seleccione un usuario para iniciar sesión</div>
  <div class="users-list" id="usersList"></div>
  <div class="bottom-buttons">
    <button id="btnAddAccount">Añadir cuenta</button>
    <button id="btnAddExisting">Añadir cuenta existente</button>
    <button id="btnGuest">Entrar como Invitado</button>
  </div>
</div>

<!-- Modal Registro -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h2>Crear Nueva Cuenta</h2>
    <label for="inputEmail">Gmail</label>
    <input type="email" id="inputEmail" placeholder="usuario@gmail.com" />
    <label for="inputName">Nombre</label>
    <input type="text" id="inputName" placeholder="Nombre para mostrar" />
    <label for="inputImage">Imagen de perfil</label>
    <input type="file" id="inputImage" accept="image/*" />
    <img src="" alt="Previsualización" class="img-preview" id="imgPreview" style="display:none" />
    <label for="inputPass">Contraseña</label>
    <input type="password" id="inputPass" placeholder="Contraseña" />
    <label for="inputConfirmPass">Confirmar contraseña</label>
    <input type="password" id="inputConfirmPass" placeholder="Confirmar contraseña" />
    <div class="modal-buttons">
      <button id="btnCreate">Crear</button>
      <button id="btnCancel">Cancelar</button>
    </div>
  </div>
</div>

<!-- CRT Overlay -->
<div class="crt-overlay"></div>
<div class="crt-glow"></div>

<script>
let accounts = JSON.parse(localStorage.getItem("accounts") || "[]");

const usersList = document.getElementById("usersList");
const btnAddAccount = document.getElementById("btnAddAccount");
const btnAddExisting = document.getElementById("btnAddExisting");
const btnGuest = document.getElementById("btnGuest");
const modalBg = document.getElementById("modalBg");
const inputEmail = document.getElementById("inputEmail");
const inputName = document.getElementById("inputName");
const inputImage = document.getElementById("inputImage");
const imgPreview = document.getElementById("imgPreview");
const inputPass = document.getElementById("inputPass");
const inputConfirmPass = document.getElementById("inputConfirmPass");
const btnCreate = document.getElementById("btnCreate");
const btnCancel = document.getElementById("btnCancel");

function renderUsers(){
  usersList.innerHTML = "";
  accounts.forEach((acc, i) => {
    const div = document.createElement("div");
    div.className = "user-item";
    div.innerHTML = `
      <img src="${acc.image}" alt="Foto de ${acc.name}" />
      <div class="user-name">${acc.name}</div>
      <div class="user-actions" style="margin-left:auto; display:flex; gap:4px;">
        <button class="edit-btn">✏️</button>
        <button class="remove-btn">❌</button>
      </div>
    `;

    // Login al hacer click
    div.querySelector(".user-name").parentNode.onclick = (e) => {
      if(e.target.tagName !== 'BUTTON') login(i);
    };

    // Editar usuario
    div.querySelector(".edit-btn").onclick = (e) => {
      e.stopPropagation();
      editUser(i);
    };

    // Quitar usuario de la pantalla
    div.querySelector(".remove-btn").onclick = (e) => {
      e.stopPropagation();
      removeUser(i);
    };

    usersList.appendChild(div);
  });

  btnAddAccount.style.display = accounts.length >= 3 ? "none" : "block";
}

// ---------- MODAL CREAR CUENTA ----------
let createAccountHandler = () => {
  const gmail = inputEmail.value.trim().toLowerCase();
  const name = inputName.value.trim();
  const pass = inputPass.value;
  const confirmPass = inputConfirmPass.value;
  const imageSrc = imgPreview.src;

  if(!gmail || !name || !pass || !confirmPass){
    alert("Completa todos los campos.");
    return;
  }

  if(!validateEmail(gmail)){
    alert("Email no válido.");
    return;
  }

  if(pass !== confirmPass){
    alert("Las contraseñas no coinciden.");
    return;
  }

  if(accounts.some(a => a.gmail === gmail)){
    alert("Ese Gmail ya está registrado.");
    return;
  }

  if(accounts.length >= 3){
    alert("Solo se permiten 3 cuentas.");
    return;
  }

  if(!imageSrc || imageSrc === ""){
    alert("Selecciona una imagen de perfil.");
    return;
  }

  accounts.push({ gmail, name, pass, image: imageSrc });
  localStorage.setItem("accounts", JSON.stringify(accounts));
  modalBg.style.display = "none";
  renderUsers();
  resetModal();
};

btnCreate.onclick = createAccountHandler;

btnAddAccount.onclick = () => {
  resetModal();
  modalBg.style.display = "flex";
};

btnCancel.onclick = () => {
  modalBg.style.display = "none";
};

// Cambiar imagen
inputImage.onchange = (e) => {
  const file = e.target.files[0];
  if(file){
    const reader = new FileReader();
    reader.onload = function(ev){
      imgPreview.src = ev.target.result;
      imgPreview.style.display = "block";
    };
    reader.readAsDataURL(file);
  } else {
    imgPreview.style.display = "none";
    imgPreview.src = "";
  }
};

// ---------- FUNCIONES UTILES ----------
function validateEmail(email) {
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

function login(index){
  const pass = prompt(`Contraseña para ${accounts[index].name}:`);
  if(pass === null) return;
  if(pass === accounts[index].pass){
    alert(`Bienvenido ${accounts[index].name}!`);
  } else {
    alert("Contraseña incorrecta.");
  }
}

btnGuest.onclick = () => {
  alert("Entrando como Invitado...");
};

// ---------- NUEVAS FUNCIONES ----------
function editUser(index){
  const acc = accounts[index];
  inputEmail.value = acc.gmail; // no editable
  inputEmail.disabled = true;
  inputName.value = acc.name;
  imgPreview.src = acc.image;
  imgPreview.style.display = "block";
  modalBg.style.display = "flex";

  btnCreate.onclick = () => {
    const name = inputName.value.trim();
    const imageSrc = imgPreview.src;

    if(!name){
      alert("El nombre no puede estar vacío.");
      return;
    }

    if(!imageSrc || imageSrc === ""){
      alert("Selecciona una imagen de perfil.");
      return;
    }

    accounts[index].name = name;
    accounts[index].image = imageSrc;
    localStorage.setItem("accounts", JSON.stringify(accounts));
    modalBg.style.display = "none";
    inputEmail.disabled = false;
    renderUsers();
    resetModal();
  };
}

function removeUser(index){
  const removed = accounts.splice(index, 1)[0];
  localStorage.setItem("accounts", JSON.stringify(accounts));
  renderUsers();
  alert(`Cuenta de ${removed.name} removida de la pantalla.`);
}

// Añadir cuenta existente
btnAddExisting.onclick = () => {
  const gmail = prompt("Introduce el Gmail de la cuenta existente:");
  if(!gmail) return;

  const allAccounts = JSON.parse(localStorage.getItem("accounts") || "[]");
  const account = allAccounts.find(a => a.gmail === gmail.toLowerCase());
  if(!account){
    alert("No existe una cuenta con ese Gmail.");
    return;
  }

  if(accounts.some(a => a.gmail === account.gmail)){
    alert("La cuenta ya está en la lista.");
    return;
  }

  accounts.push(account);
  localStorage.setItem("accounts", JSON.stringify(accounts));
  renderUsers();
};

// Reset modal
function resetModal(){
  inputEmail.value = "";
  inputEmail.disabled = false;
  inputName.value = "";
  inputImage.value = "";
  imgPreview.style.display = "none";
  inputPass.value = "";
  inputConfirmPass.value = "";
  btnCreate.onclick = createAccountHandler;
}

renderUsers();
</script>

</body>
</html>
